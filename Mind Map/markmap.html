<!DOCTYPE html>

<head>

  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      background: #111;
      height: 100vh;
      width: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }

    svg#mindmap {
      width: 100%;
      height: 100%;
      display: block;
    }

    svg text {
      fill: #ffffff !important;
    }

    .markmap-foreign,
    .markmap-foreign div,
    .markmap-foreign span {
      color: #ffffff !important;
      font-weight: 500;
    }

    a {
      color: #818cf8 !important;
    }

    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #111;
      color: #888;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      transition: opacity 0.5s;
      font-family: monospace;
    }
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/markmap-toolbar@0.15.4/dist/style.css">
</head>

    window.onload = function () {
      try {
        const { markmap } = window;
        const { Markmap, Toolbar } = markmap;
        const mm = Markmap.create('#mindmap', { autoFit: true, fitRatio: 0.95, duration: 500, color: () => '#818cf8' }, data);
        const toolbar = new Toolbar();
        toolbar.attach(mm);
        const el = toolbar.render();
        Object.assign(el.style, { position: 'absolute', bottom: '20px', right: '20px' });
        document.body.append(el);
        const style = document.createElement('style');
        style.innerHTML = `.markmap-node > text { fill: #ffffff !important; } .markmap-foreign { color: #ffffff !important; }`;
        document.head.appendChild(style);
        document.getElementById('loading').style.opacity = '0';
        setTimeout(() => document.getElementById('loading').remove(), 500);
      } catch (e) {
        document.getElementById('loading').innerHTML = `<span style='color:red'>Error: ${e.message}</span>`;
      }
    };

</body>
