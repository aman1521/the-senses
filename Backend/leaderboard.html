<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Senses - Global Leaderboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.95;
        }

        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .filter-btn {
            padding: 12px 20px;
            border: 2px solid white;
            background: transparent;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1em;
            transition: all 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: white;
            color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .leaderboard-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        .leaderboard-header {
            padding: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .leaderboard-header h2 {
            font-size: 1.8em;
        }

        .total-count {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .leaderboard-body {
            overflow-x: auto;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        .leaderboard-table thead {
            background: #f8f9fa;
            border-bottom: 2px solid #ddd;
        }

        .leaderboard-table th {
            padding: 15px 20px;
            text-align: left;
            font-weight: 600;
            color: #333;
            font-size: 0.95em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .leaderboard-table tbody tr {
            border-bottom: 1px solid #eee;
            transition: background 0.3s;
        }

        .leaderboard-table tbody tr:hover {
            background: #f5f5f5;
        }

        .leaderboard-table tbody tr.top-3 {
            background: #fffbf0;
            border-left: 4px solid #FFD700;
        }

        .leaderboard-table td {
            padding: 15px 20px;
            color: #333;
            font-size: 0.95em;
        }

        .rank-column {
            font-weight: 700;
            font-size: 1.2em;
            width: 60px;
        }

        .rank-1 { color: #FFD700; }
        .rank-2 { color: #C0C0C0; }
        .rank-3 { color: #CD7F32; }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.1em;
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 3px;
        }

        .user-meta {
            font-size: 0.85em;
            color: #999;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 1.8em;
            background: #f0f0f0;
            border: 2px solid #ddd;
        }

        .score-display {
            text-align: center;
            min-width: 100px;
        }

        .score-value {
            font-weight: 700;
            font-size: 1.3em;
            color: #667eea;
        }

        .score-label {
            font-size: 0.8em;
            color: #999;
            margin-top: 2px;
        }

        .percentile-bar {
            width: 100%;
            height: 6px;
            background: #eee;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 5px;
        }

        .percentile-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .difficulty-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .difficulty-easy {
            background: #d4f4dd;
            color: #0d7f3e;
        }

        .difficulty-medium {
            background: #fff4d4;
            color: #8b5a00;
        }

        .difficulty-hard {
            background: #ffd4d4;
            color: #8b0000;
        }

        .trust-score {
            font-weight: 600;
            color: #27ae60;
            padding: 4px 8px;
            background: #d4f4dd;
            border-radius: 6px;
            font-size: 0.9em;
        }

        .profile-icon {
            display: inline-block;
            padding: 2px 8px;
            background: #f0f0f0;
            border-radius: 4px;
            font-size: 0.85em;
            color: #667eea;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .empty-state h3 {
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .empty-state p {
            opacity: 0.9;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .stat-card h4 {
            color: #999;
            font-size: 0.9em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }

        @media (max-width: 768px) {
            .leaderboard-table {
                font-size: 0.85em;
            }

            .leaderboard-table th,
            .leaderboard-table td {
                padding: 10px;
            }

            .user-details .user-name {
                font-size: 0.95em;
            }

            .rank-column {
                width: 40px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏆 The Senses Leaderboard</h1>
            <p>Global Rankings | AI Intelligence Challenge</p>
        </div>

        <div class="stats-row" id="statsRow">
            <div class="stat-card">
                <h4>Total Users</h4>
                <div class="value" id="totalUsers">-</div>
            </div>
            <div class="stat-card">
                <h4>Highest Score</h4>
                <div class="value" id="highestScore">-</div>
            </div>
            <div class="stat-card">
                <h4>Average Score</h4>
                <div class="value" id="avgScore">-</div>
            </div>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="loadLeaderboard('global')">🌍 Global</button>
            <button class="filter-btn" onclick="loadLeaderboard('us')">🇺🇸 United States</button>
            <button class="filter-btn" onclick="loadLeaderboard('uk')">🇬🇧 United Kingdom</button>
            <button class="filter-btn" onclick="loadLeaderboard('developer')">👨‍💻 Developers</button>
            <button class="filter-btn" onclick="loadLeaderboard('designer')">🎨 Designers</button>
            <button class="filter-btn" onclick="loadLeaderboard('marketer')">📊 Marketers</button>
        </div>

        <div class="leaderboard-card">
            <div class="loading" id="loading">
                <div class="spinner"></div>
            </div>
            
            <div id="leaderboardContent">
                <div class="leaderboard-header">
                    <div>
                        <h2 id="leaderboardTitle">🌍 Global Leaderboard</h2>
                    </div>
                    <div class="total-count">
                        <span id="totalCount">Loading...</span> Users
                    </div>
                </div>

                <div class="leaderboard-body">
                    <table class="leaderboard-table">
                        <thead>
                            <tr>
                                <th style="width: 80px;">Rank</th>
                                <th style="flex: 1;">User</th>
                                <th style="width: 120px;">Profile</th>
                                <th style="width: 100px;">Score</th>
                                <th style="width: 100px;">Difficulty</th>
                                <th style="width: 120px;">Performance</th>
                                <th style="width: 80px;">Trust</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboardBody">
                            <tr>
                                <td colspan="7" style="text-align: center; padding: 40px; color: #999;">
                                    Loading leaderboard...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadLeaderboard(type) {
            // Update button states
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            const loading = document.getElementById('loading');
            loading.style.display = 'block';

            try {
                let endpoint = '/api/leaderboard';
                let title = '🌍 Global Leaderboard';

                if (type === 'global') {
                    endpoint = '/api/leaderboard';
                    title = '🌍 Global Leaderboard';
                } else if (['us', 'uk', 'canada', 'australia', 'spain'].includes(type)) {
                    endpoint = `/api/leaderboard?country=${type.toUpperCase()}`;
                    title = `📍 ${type.toUpperCase()} Leaderboard`;
                } else {
                    endpoint = `/api/leaderboard?profile=${type}`;
                    title = `👥 ${type.charAt(0).toUpperCase() + type.slice(1)} Leaderboard`;
                }

                const response = await fetch(endpoint);
                if (!response.ok) throw new Error('Failed to load leaderboard');

                const data = await response.json();
                
                if (data.success && data.data.leaderboard) {
                    displayLeaderboard(data.data.leaderboard, title);
                    updateStats(data.data.leaderboard);
                } else {
                    throw new Error('Invalid response');
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('leaderboardBody').innerHTML = `
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 40px; color: #e74c3c;">
                            Error loading leaderboard: ${error.message}
                        </td>
                    </tr>
                `;
            } finally {
                loading.style.display = 'none';
            }
        }

        function displayLeaderboard(leaderboard, title) {
            document.getElementById('leaderboardTitle').textContent = title;
            document.getElementById('totalCount').textContent = leaderboard.length;

            const tbody = document.getElementById('leaderboardBody');
            tbody.innerHTML = leaderboard.map((entry, index) => `
                <tr class="${index < 3 ? 'top-3' : ''}">
                    <td class="rank-column rank-${entry.rank || index + 1}">
                        ${getMedalEmoji(entry.rank || index + 1)} #${entry.rank || index + 1}
                    </td>
                    <td>
                        <div class="user-info">
                            <div class="user-avatar">${entry.userName.charAt(0).toUpperCase()}</div>
                            <div class="user-details">
                                <div class="user-name">${entry.userName}</div>
                                <div class="user-meta">${entry.country || 'Global'}</div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <span class="profile-icon">${getProfileEmoji(entry.jobProfile)} ${entry.jobProfile}</span>
                    </td>
                    <td>
                        <div class="score-display">
                            <div class="score-value">${entry.score}</div>
                            <div class="score-label">/100</div>
                            <div class="percentile-bar">
                                <div class="percentile-fill" style="width: ${entry.percentile}%"></div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <span class="difficulty-badge difficulty-${entry.difficulty.toLowerCase()}">
                            ${entry.difficulty}
                        </span>
                    </td>
                    <td style="text-align: center;">
                        <div style="font-size: 1.5em; margin-bottom: 5px;">${entry.badge?.emoji || '⭐'}</div>
                        <div style="font-size: 0.85em; color: #999;">${entry.badge?.name || 'Bronze'}</div>
                    </td>
                    <td>
                        <span class="trust-score">✓ ${entry.trustScore}%</span>
                    </td>
                </tr>
            `).join('');
        }

        function updateStats(leaderboard) {
            if (!leaderboard || leaderboard.length === 0) return;

            const scores = leaderboard.map(e => e.score);
            const highest = Math.max(...scores);
            const average = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);

            document.getElementById('totalUsers').textContent = leaderboard.length;
            document.getElementById('highestScore').textContent = highest;
            document.getElementById('avgScore').textContent = average;
        }

        function getMedalEmoji(rank) {
            switch(rank) {
                case 1: return '🥇';
                case 2: return '🥈';
                case 3: return '🥉';
                default: return '▪️';
            }
        }

        function getProfileEmoji(profile) {
            switch(profile.toLowerCase()) {
                case 'developer': return '👨‍💻';
                case 'designer': return '🎨';
                case 'marketer': return '📊';
                default: return '👤';
            }
        }

        // Load global leaderboard on page load
        window.addEventListener('load', () => {
            loadLeaderboard('global');
        });
    </script>
</body>
</html>
